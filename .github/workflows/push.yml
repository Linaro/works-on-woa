name: Deploy old website

on:
  push:
    branches: ["main", "staging"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20.x"

permissions:
  id-token: write
  contents: read

jobs:
  pre-build:
    runs-on: ubuntu-latest
    outputs:
      env_name: ${{ steps.set_env.outputs.env_name }}
      stage: ${{ steps.set_env.outputs.stage }}
    steps:
      - name: Set environment name
        id: set_env
        run: |
          if [[ "${{ github.ref_name }}" == "staging" ]]; then
            echo "env_name=Development" >> $GITHUB_OUTPUT
            echo "stage=dev" >> $GITHUB_OUTPUT
          fi
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "env_name=Production" >> $GITHUB_OUTPUT
            echo "stage=main" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    needs: [pre-build]
    runs-on: ubuntu-latest
    environment:
      name: ${{ needs.pre-build.outputs.env_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        env:
          VITE_APPINSIGHTS_CONNECTION_STRING: ${{ secrets.VITE_APPINSIGHTS_CONNECTION_STRING }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::497503705704:role/GitHub-OIDC-Role
          aws-region: us-east-1

      - name: Deploy with SST
        run: npx sst deploy --stage ${{ needs.pre-build.outputs.stage }}
